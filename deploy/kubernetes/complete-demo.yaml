---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: frontend-permissive
  namespace: sock-shop-hardened
spec:
  selector:
    matchLabels:
      name: front-end
  mtls:
    mode: PERMISSIVE
  
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-external-to-frontend
  namespace: sock-shop-hardened
spec:
  selector:
    matchLabels:
      name: front-end
  action: ALLOW
  rules:
  - to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS", "HEAD"]
        paths: ["/*"]
---
apiVersion: security.istio.io/v1beta1
