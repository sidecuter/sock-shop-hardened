---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-external-to-frontend
  namespace: sock-shop-hardened
spec:
  selector:
    matchLabels:
      name: front-end
  action: ALLOW
  rules:
  - to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS", "HEAD"]
        paths: ["/*"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-front-end-to-catalogue
  namespace: sock-shop-hardened
spec:
  selector:
    matchLabels:
      name: catalogue
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/sock-shop-hardened/sa/front-end"]
    to:
    - operation:
        methods: ["GET", "POST", "OPTIONS"]
        paths: [
          "/catalogue", "/catalogue*",
          "/catalogue/", "/catalogue/*",
          "/products*", "/products/*",
          "/health", "/health/*"
        ]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-orders-to-user
  namespace: sock-shop-hardened
spec:
  selector:
    matchLabels:
      name: user
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/sock-shop-hardened/sa/orders"]
    to:
    - operation:
        methods: ["GET", "OPTIONS"]
        paths: ["/customers*", "/customer*", "/addresses*", "/address*", "/cards*", "/card*", "/health*"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
