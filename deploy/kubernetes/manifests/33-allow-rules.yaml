        principals: ["cluster.local/ns/sock-shop-hardened/sa/front-end"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
        paths: [
            "/users", "/users/", "/users/*",
            "/user", "/user/", "/user/*",
            "/addresses", "/addresses/", "/addresses/*",
            "/address", "/address/", "/address/*",
            "/cards", "/cards/", "/cards/*",
            "/card", "/card/", "/card/*",
            "/login", "/login/",
            "/register", "/register/",
            "/health", "/health/*",
            "/customers*", "/customer*",
          ]
