---
apiVersion: v1
kind: Service
metadata:
  name: user-db
  labels:
    name: user-db
  namespace: sock-shop-hardened
spec:
  ports:
    # the port that this service should serve on
  - name: mongo
    port: 27017
    targetPort: 27017
    protocol: TCP
    appProtocol: tcp
  selector:
    name: user-db

